# nginx/quantbot.conf
# 放置路径：/etc/nginx/sites-available/quantbot.conf
# 软链接：ln -s /etc/nginx/sites-available/quantbot.conf /etc/nginx/sites-enabled/
#
# 申请证书（Let's Encrypt）：
#   certbot --nginx -d your-domain.com
#
# 如果只用 IP 访问（无域名），删掉 SSL 相关部分，只保留 HTTP server 块

# ── HTTP → HTTPS 重定向 ──────────────────────────────────────────────────
server {
    listen 80;
    server_name your-domain.com;   # 改成你的域名或 IP

    # Let's Encrypt 验证路径
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS 主配置 ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name your-domain.com;   # 改成你的域名

    # SSL 证书（certbot 自动生成后填写）
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 安全头
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy no-referrer-when-downgrade;

    # ── API 请求代理到 FastAPI ──────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── WebSocket 代理（关键：必须设置 Upgrade 头）────────────────────
    location /ws/ {
        proxy_pass             http://127.0.0.1:8080;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host $host;
        proxy_read_timeout     3600s;   # WS 长连接不超时
        proxy_send_timeout     3600s;
    }

    # ── 前端静态文件（React SPA）──────────────────────────────────────
    location / {
        proxy_pass       http://127.0.0.1:8080;
        proxy_set_header Host $host;
    }
}

# nginx/quantbot.conf
# 放置路径：/etc/nginx/sites-available/quantbot.conf
# 软链接：ln -s /etc/nginx/sites-available/quantbot.conf /etc/nginx/sites-enabled/
#
# 申请证书（Let's Encrypt）：
#   certbot --nginx -d your-domain.com

# ── 速率限制区域定义（放在 http 块或 include 的文件中）─────────────────────────
# 注意：若已在 nginx.conf 的 http 块中定义，则此处省略；否则需包含在 http 块中
# limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
# limit_req_zone $binary_remote_addr zone=api_auth:10m rate=3r/m;

# ── Gzip 压缩（对国内访问跨太平洋链路尤为重要）──────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_buffers 16 8k;
gzip_http_version 1.1;
gzip_min_length 256;
gzip_types
    text/plain text/css text/xml text/javascript
    application/json application/javascript application/xml
    application/x-font-ttf font/opentype image/svg+xml;

# ── HTTP → HTTPS 重定向 ──────────────────────────────────────────────────────
server {
    listen 80;
    server_name your-domain.com;   # ← 改成你的域名或服务器 IP

    # Let's Encrypt 验证路径
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS 主配置 ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name your-domain.com;   # ← 改成你的域名

    # SSL 证书（certbot 自动生成后填写）
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── 安全响应头 ──────────────────────────────────────────────────────────
    # 隐藏 Nginx 版本号
    server_tokens off;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    # Content-Security-Policy：仅允许自身域名加载资源
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' wss://$host; font-src 'self';" always;
    # 禁止浏览器嵌入（防 clickjacking）
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── 请求体大小限制（防止大文件上传攻击）──────────────────────────────────
    client_max_body_size 1m;    # API 请求最大 1MB，量化 Bot 无需大文件上传
    client_body_timeout 10s;    # 请求体读取超时

    # 针对国内访问：增大超时（跨太平洋延迟高）
    proxy_connect_timeout   30s;
    proxy_send_timeout      60s;
    proxy_read_timeout      60s;
    send_timeout            60s;

    # ── 认证端点特殊限流（防暴力破解）──────────────────────────────────────
    location ~ ^/api/auth/(login|register)$ {
        # limit_req zone=api_auth burst=5 nodelay;

        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ── API 请求代理到 FastAPI ──────────────────────────────────────────────
    location /api/ {
        # limit_req zone=api_general burst=20 nodelay;

        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # 不缓存 API 响应
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ── WebSocket 代理（国内访问需要更长的读超时）──────────────────────────
    location /ws/ {
        proxy_pass             http://127.0.0.1:8080;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_set_header       X-Real-IP  $remote_addr;

        # 国内跨洲连接易断，心跳超时设长一些
        proxy_read_timeout     7200s;
        proxy_send_timeout     7200s;
        proxy_connect_timeout  30s;

        # 关闭代理层缓冲，实时转发 WebSocket 帧
        proxy_buffering        off;
    }

    # ── 前端静态文件（React SPA）——强缓存提升国内访问速度 ─────────────────
    location /assets/ {
        proxy_pass       http://127.0.0.1:8080;
        proxy_set_header Host $host;

        # 静态资源（带 hash 文件名）长期缓存，减少跨洲重复传输
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location / {
        proxy_pass       http://127.0.0.1:8080;
        proxy_set_header Host $host;

        # index.html 不缓存，确保更新后立即生效
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # ── 健康检查（可被监控系统调用，不记录日志）────────────────────────────
    location /api/health {
        proxy_pass http://127.0.0.1:8080;
        access_log off;
    }

    # ── 禁止访问隐藏文件（.env、.git 等）──────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

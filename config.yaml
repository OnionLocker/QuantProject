# config.yaml - 量化 Bot 全局配置
# 修改此文件后重启 bot 生效，无需改代码

bot:
  symbol: "BTC/USDT:USDT"
  timeframe: "1h"
  leverage: 3
  contract_size: 0.01
  taker_fee_rate: 0.0005
  check_interval: 300          # 每轮扫描间隔（秒）

risk:
  risk_per_trade_pct: 0.01     # 单笔最大亏损占本金比例
  max_trade_amount: 1000       # 单笔最大金额上限（USDT）
  max_consecutive_losses: 3    # 连续亏损 N 次触发熔断
  daily_loss_limit_pct: 0.05   # 单日亏损超过此比例触发熔断

strategy:
  name: "AUTO"                 # AUTO = 启用自动选择器；或直接填策略名固定使用
  params: {}

# ── 自动策略选择器配置（strategy.name = "AUTO" 时生效）────────────────────────
selector:
  # 技术面参数 (V5.0: BTC适配 - 降低趋势门槛)
  adx_period:       14
  adx_bull_thresh:  18         # V5.0: 从20降到18，BTC ADX普遍偏低，18即有趋势迹象
  adx_range_thresh: 13         # V5.0: 从16降到13，更少行情被判为震荡
  ema_short:        10         # V5.0: 从12降到10，更灵敏
  ema_mid:          30         # V5.0: 从36降到30，提升反应速度
  ema_long:         80         # V5.2: 从120降到80（3.3天趋势线），更适合BTC 1h节奏
  bb_period:        20
  bb_squeeze_pct:   0.03       # V5.2: 从0.04降到0.03，减少误判挤压的概率

  # 权重配置 (V5.0: 技术面权重最大化)
  tech_weight:      1.0
  news_weight:      0.05       # V5.0: 从0.08降到0.05，减少噪声干扰
  news_max_age_min: 120

  # 防抖 (V5.0: 进一步加速确认)
  confirm_bars:     2
  confirm_bars_fast:    1       # 高置信度直接确认
  confirm_bars_slow:    2       # V5.0: 从3降到2，低置信度也快速响应
  confirm_fast_thresh:  0.55    # V5.0: 从0.65降到0.55，更容易快速确认
  confirm_slow_thresh:  0.30    # V5.0: 从0.35降到0.30

  # 各 regime 对应的策略名
  strategy_bull:    "BULL"
  strategy_bear:    "BEAR"
  strategy_ranging: "RANGE"
  strategy_breakout: "BIG_CANDLE"

  # V2.0: 资金费率 + OI (V5.0: 降低链上数据的压制作用)
  enable_market_extra: true
  funding_weight:     0.06     # V5.0: 从0.10降到0.06
  oi_weight:          0.05     # V5.0: 从0.08降到0.05
  funding_extreme:    0.0008   # V5.0: 从0.0006放宽到0.0008
  oi_spike_pct:       0.15     # V5.0: 从0.12放宽到0.15
  dynamic_news_weight: true

  # V3.0: 资金费率否决权 (V5.0: 收紧否决触发)
  funding_veto_enable: true
  funding_veto_mult:   3.0     # V5.0: 从2.5提高到3.0，更极端才否决
  funding_veto_contra: true

  # V4.0: 多时间框架确认 (V5.0: 降低MTF压制)
  mtf_enable:        true
  mtf_ema_period:    30        # V5.0: 从34降到30
  mtf_weight:        0.12      # V5.2: 从0.06提到0.12，MTF有方向时应该有更大话语权

  # V4.0: VWAP 偏离度 (V5.0: 放宽均值回归压力)
  vwap_period:       20
  vwap_deviation_pct: 0.03     # V5.0: 从0.02放宽到0.03

  # V4.0: 动态否决权阈值
  dynamic_veto_enable:  true
  dynamic_veto_pctile:  95     # V5.0: 从92提高到95，更少触发否决

  # V4.0: 信号质量评分阈值 (V5.0: 大幅降低门槛)
  signal_quality_full:  30     # V5.2: 从40降到30，匹配新评分逻辑
  signal_quality_half:  15     # V5.2: 从20降到15

  # 各策略的参数覆盖 (V5.0: BTC 1h 盈利导向优化)
  strategy_params:
    BULL:
      ema_fast:      8
      ema_slow:      21
      ema_trend:     30         # V5.0: 从34降到30
      adx_threshold: 18         # V5.0: 从20降到18
      atr_sl_mult:   1.5        # V5.1: 从1.0提到1.5，BTC 1H插针容错（机构博弈环境）
      rr1:           1.5        # V5.0: 从1.4提到1.5，风险收益比更优
      rsi_os:        45         # V5.0: 从42放宽到45，更容易触发B2回调买点
      cooldown:      2          # V5.0: 从3降到2
    BEAR:
      ema_fast:      8
      ema_slow:      21
      ema_trend:     30
      adx_threshold: 18
      atr_sl_mult:   1.5        # V5.1: 统一1.5，BTC 1H插针容错
      rr1:           1.5
      rsi_ob:        55         # V5.0: 从58降到55，更容易触发S2反弹空点
      cooldown:      2
    RANGE:
      bb_period:     20
      bb_std:        2.0
      squeeze_pct:   0.05       # V5.0: 从0.045放宽到0.05
      squeeze_lookback: 10      # V5.0: 从12降到10
      range_lookback:   15      # V5.0: 从18降到15
      adx_rise_thresh:  1.0     # V5.0: 从1.5降到1.0
      vol_mult:      1.05       # V5.0: 从1.15降到1.05
      body_ratio_min: 45.0      # V5.0: 从50降到45
      atr_sl_mult:   1.5        # V5.1: 从0.8提到1.5，统一BTC 1H插针容错
      rr1:           1.5
      rr2:           2.8
      cooldown:      3          # V5.0: 从4降到3
    BIG_CANDLE:
      body_pct:      0.8        # V5.0: 从0.9降到0.8
      vol_mult:      1.1        # V5.0: 从1.15降到1.1
      body_ratio_min: 45.0      # V5.0: 从50降到45
      sl_mode:       1
      atr_sl_mult:   1.5        # V5.1: 从1.0提到1.5，统一BTC 1H插针容错
      rr1:           1.5        # V5.0: 从1.4提到1.5
      breakout_lookback: 10     # V5.0: 从12降到10
      high_pos_lookback: 36
      bb_squeeze_pct: 3.5       # V5.0: 从3.0放宽到3.5
      cooldown:      2          # V5.0: 从3降到2
      enable_short:  1

api:
  host: "0.0.0.0"
  port: 8080
  enable: true
  # CORS 允许的源列表
  # ⚠️ 生产环境务必替换为实际域名！["*"] 仅用于开发调试
  # 例如: ["https://your-domain.com", "https://admin.your-domain.com"]
  cors_origins: ["*"]
  # 速率限制（每 IP 每分钟请求数）
  rate_limit:
    general_rpm: 120                   # 普通 API 端点
    auth_rpm: 10                       # 登录/注册端点（防暴力破解）

# ── OpenClaw 新闻同步（外部新闻面输入）──────────────────────────────────────
# 当 strategy.selector.news_weight > 0 时建议启用。
# OpenClaw 按固定频率抓新闻、分析后写回 QuantBot，selector 直接读 news_summary。
news_sync:
  enable: true                       # 是否允许外部新闻同步
  provider: "openclaw"              # 预留字段：当前固定为 openclaw
  interval_hours: 4                  # 每隔多少小时抓取一次新闻
  lookback_hours: 12                 # 回看最近多少小时的重要新闻
  max_results: 12                    # 单次最多分析多少条新闻
  min_confidence: 0.55               # 低于此置信度仅做摘要，不建议影响策略
  symbols: ["BTC", "Bitcoin", "ETF", "Fed", "crypto"]

# ── V2.0: AI 情绪分析客户端 ─────────────────────────────────────────────────
# ⚠️ API Key 已移到 .env 环境变量（AI_API_KEY），请勿在此文件中填写密钥！
# 环境变量配置：AI_API_KEY / AI_BASE_URL / AI_MODEL
ai:
  # api_key 已移到 .env → AI_API_KEY（安全加固）
  base_url: "https://api.openai.com/v1"   # 或 https://api.deepseek.com/v1
  model: "gpt-4o-mini"               # 推荐：gpt-4o-mini (便宜) 或 deepseek-chat

# ── V2.5: 高级风控参数 ──────────────────────────────────────────────────────
risk_v25:
  # Trailing Stop（追踪止损）
  trailing_stop_enable: true          # 是否启用追踪止损
  trailing_stop_trigger: 0.5          # 盈利达 ATR*此值 后激活追踪
  trailing_stop_distance: 0.8         # 从最优价回撤 ATR*此值 更新 SL

  # 时间止损（持仓超时平仓）
  time_stop_enable: true              # 是否启用时间止损
  time_stop_bars: 24                  # 最多持仓 N 根K线（1h → 24h）

  # 动态仓位（根据 regime 置信度和策略胜率调整）
  dynamic_position_enable: true       # 是否启用动态仓位

  # V4.0: 回撤保护（分级触发：警告/减仓/熔断）
  drawdown_warning_pct: 0.03          # 3% 回撤 → 警告（仓位 75%）
  drawdown_reduce_pct:  0.05          # 5% 回撤 → 减仓（仓位 50%）
  drawdown_halt_pct:    0.08          # 8% 回撤 → 熔断（停止交易）

  # V4.0: Equity Curve Trading（资金曲线跌破均线时降权）
  equity_curve_enable:    true        # 是否启用 Equity Curve Trading
  equity_ema_period:      10          # 资金曲线 EMA 周期
  equity_below_ema_scale: 0.6         # 低于 EMA 时仓位缩放至 60%

  # V4.0: 每日最大交易次数限制（防止过度交易）
  max_daily_trades:  8                # 每日最多开仓 8 次


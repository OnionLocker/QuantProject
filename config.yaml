# config.yaml - 量化 Bot 全局配置
# 修改此文件后重启 bot 生效，无需改代码

bot:
  symbol: "BTC/USDT:USDT"
  timeframe: "1h"
  leverage: 3
  contract_size: 0.01
  taker_fee_rate: 0.0005
  check_interval: 300          # 每轮扫描间隔（秒）

risk:
  risk_per_trade_pct: 0.01     # 单笔最大亏损占本金比例
  max_trade_amount: 1000       # 单笔最大金额上限（USDT）
  max_consecutive_losses: 3    # 连续亏损 N 次触发熔断
  daily_loss_limit_pct: 0.05   # 单日亏损超过此比例触发熔断

strategy:
  name: "AUTO"                 # AUTO = 启用自动选择器；或直接填策略名固定使用
  params: {}

# ── 自动策略选择器配置（strategy.name = "AUTO" 时生效）────────────────────────
selector:
  # 技术面参数
  adx_period:       14
  adx_bull_thresh:  22         # ADX > 此值认为有趋势（BTC 推荐 22，加密市场 ADX 普遍偏低）
  adx_range_thresh: 18         # ADX < 此值认为震荡
  ema_short:        14         # 快速 EMA（BTC 1h 推荐 14）
  ema_mid:          40         # 中速 EMA（BTC 1h 推荐 40）
  ema_long:         120        # 慢速 EMA（BTC 1h 推荐 120 ≈ 5天，比 200 更灵敏）
  bb_period:        20
  bb_squeeze_pct:   0.03       # 布林带宽度/中轨 < 此值认为挤压

  # 权重配置
  tech_weight:      1.0        # 技术面权重（AI情绪分析未接入时建议设为1.0）
  news_weight:      0.0        # 新闻面权重（AI客户端未配置时设为0，避免空壳影响）
  news_max_age_min: 120        # 新闻数据超过此分钟数则忽略

  # 防抖：连续 N 轮确认才切换策略（避免频繁抖动）
  confirm_bars:     3

  # 各 regime 对应的策略名（必须在注册表中存在）
  strategy_bull:    "BULL"
  strategy_bear:    "BEAR"
  strategy_ranging: "RANGE"
  strategy_breakout: "BIG_CANDLE"   # ADX>40 强势突破行情使用大阳线策略

  # V2.0: 资金费率 + OI 链上数据
  enable_market_extra: true          # 是否启用资金费率/OI 数据增强
  funding_weight:     0.15           # 资金费率在综合评分中的权重
  oi_weight:          0.10           # OI在综合评分中的权重
  funding_extreme:    0.0005         # 极端资金费率阈值（>0.05%=极端）
  oi_spike_pct:       0.10           # OI 变化幅度阈值（>10%=异常）
  dynamic_news_weight: true          # 启用动态新闻权重（根据数据质量自动调整）

  # 各策略的参数覆盖（BTC/USDT 1h 优化后的默认参数）
  # 如果不填则使用策略代码里的默认值，两者现在已经同步
  strategy_params:
    BULL:
      ema_fast:      8          # 快线更灵敏
      ema_slow:      21
      ema_trend:     40         # 趋势线 ≈ 不到2天
      adx_threshold: 22         # 加密市场 ADX 普遍偏低
      atr_sl_mult:   1.2        # 止损更紧凑（旧值 1.5 太远）
      rr1:           1.5        # 止盈更快（旧值 2.0 导致持仓时间过长）
      rsi_os:        38         # 牛市回调不会太深
      cooldown:      4
    BEAR:
      ema_fast:      8
      ema_slow:      21
      ema_trend:     40
      adx_threshold: 22
      atr_sl_mult:   1.2
      rr1:           1.5
      rsi_ob:        62         # 熊市超买阈值降低
      cooldown:      4
    RANGE:
      bb_period:     20
      bb_std:        2.0
      rsi_ob:        65
      rsi_os:        35
      atr_sl_mult:   0.8        # 震荡策略止损更紧（旧值 1.0）
      cooldown:      4
    BIG_CANDLE:
      body_pct:      1.2        # 大阳线阈值降低（旧值 1.5，低波动期难触发）
      vol_mult:      1.3        # 量能要求稍放松
      body_ratio_min: 55.0      # 实体占比放宽
      sl_mode:       1          # 改为最低价止损（更紧，旧值 0=开盘价）
      atr_sl_mult:   1.2
      rr1:           1.5
      breakout_lookback: 16     # 回看 16h 而非 20h
      high_pos_lookback: 48     # 高位过滤 2 天
      cooldown:      4
      enable_short:  1

api:
  host: "0.0.0.0"
  port: 8080
  enable: true
  # CORS 允许的源列表，生产环境请替换为实际域名
  # 例如: ["https://your-domain.com", "https://admin.your-domain.com"]
  cors_origins: ["*"]

# ── V2.0: AI 情绪分析客户端 ─────────────────────────────────────────────────
# 支持 OpenAI / DeepSeek / 零一万物等 OpenAI 兼容接口
# 也可通过环境变量 AI_API_KEY / AI_BASE_URL / AI_MODEL 配置
ai:
  api_key: ""                        # 填入 API Key 后自动启用 AI 分析
  base_url: "https://api.openai.com/v1"   # 或 https://api.deepseek.com/v1
  model: "gpt-4o-mini"               # 推荐：gpt-4o-mini (便宜) 或 deepseek-chat

# ── V2.5: 高级风控参数 ──────────────────────────────────────────────────────
risk_v25:
  # Trailing Stop（追踪止损）
  trailing_stop_enable: true          # 是否启用追踪止损
  trailing_stop_trigger: 0.5          # 盈利达 ATR*此值 后激活追踪
  trailing_stop_distance: 0.8         # 从最优价回撤 ATR*此值 更新 SL

  # 时间止损（持仓超时平仓）
  time_stop_enable: true              # 是否启用时间止损
  time_stop_bars: 24                  # 最多持仓 N 根K线（1h → 24h）

  # 动态仓位（根据 regime 置信度和策略胜率调整）
  dynamic_position_enable: true       # 是否启用动态仓位


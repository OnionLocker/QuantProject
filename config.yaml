# config.yaml - 量化 Bot 全局配置
# 修改此文件后重启 bot 生效，无需改代码

bot:
  symbol: "BTC/USDT:USDT"
  timeframe: "1h"
  leverage: 3
  contract_size: 0.01
  taker_fee_rate: 0.0005
  check_interval: 300          # 每轮扫描间隔（秒）

risk:
  risk_per_trade_pct: 0.01     # 单笔最大亏损占本金比例
  max_trade_amount: 1000       # 单笔最大金额上限（USDT）
  max_consecutive_losses: 3    # 连续亏损 N 次触发熔断
  daily_loss_limit_pct: 0.05   # 单日亏损超过此比例触发熔断

strategy:
  name: "AUTO"                 # AUTO = 启用自动选择器；或直接填策略名固定使用
  params: {}

# ── 自动策略选择器配置（strategy.name = "AUTO" 时生效）────────────────────────
selector:
  # 技术面参数
  adx_period:       14
  adx_bull_thresh:  25         # ADX > 此值认为有趋势
  adx_range_thresh: 20         # ADX < 此值认为震荡
  ema_short:        20
  ema_mid:          50
  ema_long:         200
  bb_period:        20
  bb_squeeze_pct:   0.03       # 布林带宽度/中轨 < 此值认为挤压

  # 权重配置
  tech_weight:      0.7        # 技术面权重
  news_weight:      0.3        # 新闻面权重
  news_max_age_min: 120        # 新闻数据超过此分钟数则忽略

  # 防抖：连续 N 轮确认才切换策略（避免频繁抖动）
  confirm_bars:     3

  # 各 regime 对应的策略名（必须在注册表中存在）
  strategy_bull:    "BULL"
  strategy_bear:    "BEAR"
  strategy_ranging: "RANGE"
  strategy_breakout: "BIG_CANDLE"   # ADX>40 强势突破行情使用大阳线策略

  # 各策略的参数覆盖（不填则使用策略默认值）
  strategy_params:
    BULL:
      ema_fast:      9
      ema_slow:      21
      ema_trend:     50
      adx_threshold: 25
      rr1:           2.0
      cooldown:      6
    BEAR:
      ema_fast:      9
      ema_slow:      21
      ema_trend:     50
      adx_threshold: 25
      rr1:           2.0
      cooldown:      6
    RANGE:
      bb_period:     20
      bb_std:        2.0
      rsi_ob:        65
      rsi_os:        35
      cooldown:      5
    BIG_CANDLE:
      body_pct:      1.5
      vol_mult:      1.5
      sl_mode:       0
      rr1:           2.0
      cooldown:      5
      enable_short:  1

api:
  host: "0.0.0.0"
  port: 8080
  enable: true


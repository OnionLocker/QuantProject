# config.yaml - 量化 Bot 全局配置
# 修改此文件后重启 bot 生效，无需改代码

bot:
  symbol: "BTC/USDT:USDT"
  timeframe: "1h"
  leverage: 3
  contract_size: 0.01
  taker_fee_rate: 0.0005
  check_interval: 300          # 每轮扫描间隔（秒）

risk:
  risk_per_trade_pct: 0.01     # 单笔最大亏损占本金比例
  max_trade_amount: 1000       # 单笔最大金额上限（USDT）
  max_consecutive_losses: 3    # 连续亏损 N 次触发熔断
  daily_loss_limit_pct: 0.05   # 单日亏损超过此比例触发熔断

strategy:
  name: "AUTO"                 # AUTO = 启用自动选择器；或直接填策略名固定使用
  params: {}

# ── 自动策略选择器配置（strategy.name = "AUTO" 时生效）────────────────────────
selector:
  # 技术面参数
  adx_period:       14
  adx_bull_thresh:  20         # BTC 1h 放宽趋势识别，减少长期卡在 WAIT/HOLD
  adx_range_thresh: 16         # 震荡阈值略放宽，避免过早判成 range
  ema_short:        12         # 快速 EMA 更灵敏，适合 BTC 1h 节奏
  ema_mid:          36         # 中速 EMA 略收紧，提升切换反应速度
  ema_long:         96         # 慢速 EMA 从 120 降到 96，降低趋势确认滞后
  bb_period:        20
  bb_squeeze_pct:   0.035      # 稍放宽挤压判定，更容易识别突破前环境

  # 权重配置
  tech_weight:      1.0        # 技术面权重（AI情绪分析未接入时建议设为1.0）
  news_weight:      0.0        # 新闻面权重（AI客户端未配置时设为0，避免空壳影响）
  news_max_age_min: 120        # 新闻数据超过此分钟数则忽略

  # 防抖：连续 N 轮确认才切换策略（避免频繁抖动）
  confirm_bars:     3             # 默认确认根数（兼容旧配置）
  # V3.0: 动态确认根数（根据置信度自适应）
  confirm_bars_fast:    1         # BTC 1h 提高反应速度，高置信度直接确认
  confirm_bars_slow:    3         # 低置信度也别拖太久
  confirm_fast_thresh:  0.65      # 更容易进入快速确认
  confirm_slow_thresh:  0.35      # 放宽慢速阈值

  # 各 regime 对应的策略名（必须在注册表中存在）
  strategy_bull:    "BULL"
  strategy_bear:    "BEAR"
  strategy_ranging: "RANGE"
  strategy_breakout: "BIG_CANDLE"   # ADX>40 强势突破行情使用大阳线策略

  # V2.0: 资金费率 + OI 链上数据
  enable_market_extra: true          # 是否启用资金费率/OI 数据增强
  funding_weight:     0.10           # 降低链上辅助权重，减少对纯技术信号的压制
  oi_weight:          0.08           # OI 保留但降权
  funding_extreme:    0.0006         # 稍放宽极端费率阈值
  oi_spike_pct:       0.12           # OI 变化幅度阈值放宽
  dynamic_news_weight: true          # 启用动态新闻权重（根据数据质量自动调整）

  # V3.0: 资金费率否决权（极端费率时强制 WAIT，保护性机制）
  funding_veto_enable: true           # 保留保护，但降低触发概率
  funding_veto_mult:   2.5            # 更极端才否决，减少误伤趋势行情
  funding_veto_contra: true           # 只在费率与技术面方向冲突时否决（更精准）

  # V4.0: 多时间框架确认（MTF - 机构级 top-down analysis）
  mtf_enable:        true             # 保留 4h 过滤，但减轻影响
  mtf_ema_period:    34               # 4h EMA 更灵敏，适合 BTC 1h 联动
  mtf_weight:        0.10             # 降低 MTF 压制，避免 1h 信号长期被盖掉

  # V4.0: VWAP 偏离度（均值回归压力评估）
  vwap_period:       20               # VWAP 计算周期
  vwap_deviation_pct: 0.02            # 偏离 >2% 视为极端，趋势信号打折

  # V4.0: 动态否决权阈值（基于近期费率分布自适应）
  dynamic_veto_enable:  true          # 是否用动态百分位替代固定阈值
  dynamic_veto_pctile:  92            # 提高百分位，减少动态否决过于频繁

  # V4.0: 信号质量评分阈值
  signal_quality_full:  55            # BTC 1h 降低满仓门槛，减少长期 HOLD
  signal_quality_half:  35            # 放宽半仓门槛，让边缘信号也能试仓

  # 各策略的参数覆盖（BTC/USDT 1h 优化后的默认参数）
  # 如果不填则使用策略代码里的默认值，两者现在已经同步
  strategy_params:
    BULL:
      ema_fast:      8          # BTC 1h 保持灵敏
      ema_slow:      21
      ema_trend:     34         # 趋势线更灵敏，减少趋势确认滞后
      adx_threshold: 20         # 放宽趋势触发
      atr_sl_mult:   1.1        # 止损略紧，提高风险收益效率
      rr1:           1.4        # 更容易止盈落袋
      rsi_os:        42         # 回调买入条件放宽，避免一直等超深回踩
      cooldown:      3
    BEAR:
      ema_fast:      8
      ema_slow:      21
      ema_trend:     34
      adx_threshold: 20
      atr_sl_mult:   1.1
      rr1:           1.4
      rsi_ob:        58         # 做空回落条件放宽
      cooldown:      3
    RANGE:
      bb_period:     20
      bb_std:        2.0
      squeeze_pct:   0.045            # 更容易识别收缩区间
      squeeze_lookback: 12            # 稍放宽收缩回看窗口
      range_lookback:   18            # 缩短区间回看，提高响应速度
      adx_rise_thresh:  1.5           # 降低趋势启动门槛
      vol_mult:      1.15             # 放宽突破量能要求
      body_ratio_min: 50.0            # 放宽实体占比
      atr_sl_mult:   1.0
      rr1:           1.4
      rr2:           2.6
      cooldown:      4
    BIG_CANDLE:
      body_pct:      0.9        # BTC 1h 更容易捕获有效突破K
      vol_mult:      1.15       # 量能要求进一步放宽
      body_ratio_min: 50.0      # 实体占比放宽
      sl_mode:       1
      atr_sl_mult:   1.1
      rr1:           1.4
      breakout_lookback: 12     # 缩短突破回看窗口
      high_pos_lookback: 36     # 缩短高位过滤窗口
      cooldown:      3
      enable_short:  1

api:
  host: "0.0.0.0"
  port: 8080
  enable: true
  # CORS 允许的源列表，生产环境请替换为实际域名
  # 例如: ["https://your-domain.com", "https://admin.your-domain.com"]
  cors_origins: ["*"]

# ── V2.0: AI 情绪分析客户端 ─────────────────────────────────────────────────
# 支持 OpenAI / DeepSeek / 零一万物等 OpenAI 兼容接口
# 也可通过环境变量 AI_API_KEY / AI_BASE_URL / AI_MODEL 配置
ai:
  api_key: ""                        # 填入 API Key 后自动启用 AI 分析
  base_url: "https://api.openai.com/v1"   # 或 https://api.deepseek.com/v1
  model: "gpt-4o-mini"               # 推荐：gpt-4o-mini (便宜) 或 deepseek-chat

# ── V2.5: 高级风控参数 ──────────────────────────────────────────────────────
risk_v25:
  # Trailing Stop（追踪止损）
  trailing_stop_enable: true          # 是否启用追踪止损
  trailing_stop_trigger: 0.5          # 盈利达 ATR*此值 后激活追踪
  trailing_stop_distance: 0.8         # 从最优价回撤 ATR*此值 更新 SL

  # 时间止损（持仓超时平仓）
  time_stop_enable: true              # 是否启用时间止损
  time_stop_bars: 24                  # 最多持仓 N 根K线（1h → 24h）

  # 动态仓位（根据 regime 置信度和策略胜率调整）
  dynamic_position_enable: true       # 是否启用动态仓位

  # V4.0: 回撤保护（分级触发：警告/减仓/熔断）
  drawdown_warning_pct: 0.03          # 3% 回撤 → 警告（仓位 75%）
  drawdown_reduce_pct:  0.05          # 5% 回撤 → 减仓（仓位 50%）
  drawdown_halt_pct:    0.08          # 8% 回撤 → 熔断（停止交易）

  # V4.0: Equity Curve Trading（资金曲线跌破均线时降权）
  equity_curve_enable:    true        # 是否启用 Equity Curve Trading
  equity_ema_period:      10          # 资金曲线 EMA 周期
  equity_below_ema_scale: 0.6         # 低于 EMA 时仓位缩放至 60%

  # V4.0: 每日最大交易次数限制（防止过度交易）
  max_daily_trades:  8                # 每日最多开仓 8 次

